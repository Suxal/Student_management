<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark bg-primary px-4">
    <span class="navbar-brand">Student Management System</span>
    <a href="{% url 'student-create' %}" class="btn btn-light btn-sm">+ Add Student</a>
  </nav>
  <div class="container mt-4">{% block content %}{% endblock %}</div>
  <nav class="navbar navbar-dark bg-primary px-4">
  <span class="navbar-brand">Student Management System</span>
  <div class="d-flex gap-2 align-items-center">
    {% if user.is_authenticated %}
      <span class="text-white-50 small">{{ user.username }}</span>
      <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
    {% endif %}
    <a href="{% url 'student-create' %}" class="btn btn-light btn-sm">+ Add Student</a>
  </div>
</nav>
</body>
</html>
